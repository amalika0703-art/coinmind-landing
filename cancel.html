<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата отменена | CoinMind</title>

    <link rel="stylesheet" href="assets/css/cancel.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="cancel-card">

    <div class="crossmark">
        ✕
    </div>

    <h1>Оплата отменена</h1>

    <p>
        Вы отменили процесс оплаты Premium.
        Вы можете повторить попытку в любое время.
    </p>

    <div class="payment-info">

        <div class="info-item">
            <span>Статус</span>
            <strong class="cancelled">Отменено</strong>
        </div>

        <div class="info-item">
            <span>Тариф</span>
            <strong>Premium</strong>
        </div>

        <div class="info-item">
            <span>Стоимость</span>
            <strong>290 ₸</strong>
        </div>

    </div>

    <div class="action-buttons">

        <button
            class="retry-btn"
            onclick="window.location.href='index.html#premium'">
            ↺ Попробовать снова
        </button>

        <button
            class="telegram-btn"
             onclick="window.location.href='https://t.me/cash_bot'">
            Перейти в Telegram →
        </button>

    </div>

</div>

</body>
</html>
