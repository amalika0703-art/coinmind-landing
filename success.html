<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна | CoinMind</title>

    <link rel="stylesheet" href="assets/success.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="success-card">

    <div class="checkmark">
        ✓
    </div>

    <h1>Оплата успешна</h1>

    <p>
        Спасибо за покупку Premium.
        Подписка была успешно активирована.
    </p>

    <div class="premium-info">

        <div class="info-item">
            <span>Тариф</span>
            <strong>Premium</strong>
        </div>

        <div class="info-item">
            <span>Стоимость</span>
            <strong>290 ₸</strong>
        </div>

        <div class="info-item">
            <span>Статус</span>
            <strong class="active">Активен</strong>
        </div>

    </div>

    <button
        class="telegram-btn"
         onclick="window.open('https://t.me/Smart_budgetttttt_bot', '_blank')">

        Перейти в Telegram →
    </button>

</div>
<script>
    // Получаем параметры из URL
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const orderId = urlParams.get('order_id');

    console.log('🔍 Данные оплаты:', { userId, orderId });

    if (userId && orderId) {
        // Отправляем запрос на бэкенд для активации премиума
        fetch('https://mycashbot.online/api/activate-premium', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, order_id: orderId })
        })
        .then(response => response.json())
        .then(data => {
            console.log('✅ Премиум активирован:', data);
        })
        .catch(error => {
            console.error('❌ Ошибка активации:', error);
        });
    } else {
        console.warn('⚠️ Не удалось найти данные пользователя');
    }
</script>
</body>
</html>
