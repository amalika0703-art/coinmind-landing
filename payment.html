<!DOCTYPE html>
<html>
<head>
    <title>Оплата</title>
</head>
<body>
    <h1>CoinMind Premium — 290 ₸</h1>
    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AUPPsGbFJt5PII6oqUNA9R7B5oinAFuTwyQwoZ6Ve5ExzSYVHwAPV_IOTX1HWXhqd5PkQ28d4aOkZclM&currency=USD"></script>

    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return fetch('http://localhost:3000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: '2.90',
                        currency: 'USD'
                    })
                })
                .then(res => res.json())
                .then(order => order.id);
            },
            onApprove: function(data, actions) {
                return fetch('http://localhost:3000/api/orders/' + data.orderID + '/capture', {
                    method: 'POST'
                })
                .then(res => res.json())
                .then(() => {
                    alert('✅ Оплата успешна!');
                    window.location.href = 'success.html';
                });
            },
            onError: function(err) {
                alert('❌ Ошибка: ' + err.message);
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
