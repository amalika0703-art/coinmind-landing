<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна | CoinMind</title>

    <link rel="stylesheet" href="assets/success.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="success-card">

    <div class="checkmark">
        ✓
    </div>

    <h1>Оплата успешна</h1>

    <p>
        Спасибо за покупку Premium.
        Подписка была успешно активирована.
    </p>

    <div class="premium-info">

        <div class="info-item">
            <span>Тариф</span>
            <strong>Premium</strong>
        </div>

        <div class="info-item">
            <span>Стоимость</span>
            <strong>290 ₸</strong>
        </div>

        <div class="info-item">
            <span>Статус</span>
            <strong class="active">Активен</strong>
        </div>

    </div>

    <button
        class="telegram-btn"
         onclick="window.location.href='https://t.me/cash_bot'">

        Перейти в Telegram →
    </button>

</div>

</body>
</html>
