<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата Premium | CoinMind</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .payment-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
        .price { font-size: 48px; font-weight: 800; color: #1a1a2e; margin: 16px 0; }
        .price span { font-size: 20px; font-weight: 400; color: #6b7280; }
        .subtitle { color: #6b7280; margin-bottom: 24px; }
        .features { text-align: left; margin: 24px 0; list-style: none; padding: 0; }
        .features li { padding: 10px 0; border-bottom: 1px solid #f3f4f6; color: #1a1a2e; }
        .features li:last-child { border-bottom: none; }
        #paypal-button-container { margin: 20px 0; }
        .back-link { display: inline-block; margin-top: 16px; color: #6b7280; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #1a1a2e; }
        .test-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .test-credentials {
            font-size: 12px;
            color: #6b7280;
            background: #f9fafb;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            text-align: left;
        }
        .test-credentials strong {
            color: #1a1a2e;
        }
    </style>
</head>
<body>

<div class="payment-container">
    
    <div class="test-badge">🧪 ТЕСТОВЫЙ РЕЖИМ PayPal</div>
    
    <h1>💎 CoinMind Premium</h1>
    
    <div class="price">
        290 тенге
        <span>≈ $0.59 USD/ месяц</span>
    </div>
    
    <p class="subtitle">Полный доступ ко всем функциям</p>
    
    <ul class="features">
        <li>✅ AI рекомендации по расходам</li>
        <li>✅ Продвинутая аналитика</li>
        <li>✅ Ранний доступ к новым функциям</li>
        <li>✅ Приоритетная поддержка</li>
    </ul>
    
    <div id="paypal-button-container"></div>
    
    
    
    <br>
    <a href="index.html" class="back-link">← Вернуться на главную</a>
    
</div>

<!-- ТЕСТОВЫЙ PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>

<script>
    console.log('🧪 Тестовый PayPal загружен!');
    
    if (typeof paypal !== 'undefined') {
        
        paypal.Buttons({
            // СОЗДАЕМ ЗАКАЗ ПРЯМО В PayPal (БЕЗ БЭКЕНДА!)
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '0.59',
                            currency_code: 'USD'
                        },
                        description: 'CoinMind Premium - 1 месяц'
                    }],
                    application_context: {
                        shipping_preference: 'NO_SHIPPING'
                    }
                });
            },
            
            // КОГДА ОПЛАТА УСПЕШНА - СРАЗУ ПЕРЕКИДЫВАЕМ НА SUCCESS.HTML
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    console.log('✅ Платеж успешен!', details);
                    
                    // Показываем уведомление
                    alert('✅ Оплата успешна!\n\n' +
                          '👤 ' + details.payer.name.given_name + ' ' + details.payer.name.surname + '\n' +
                          '💵 ' + details.purchase_units[0].amount.value + ' USD');
                    
                    // ПРЯМОЕ ПЕРЕНАПРАВЛЕНИЕ НА SUCCESS.HTML
                    const userId = '12345';
                    window.location.href = 'https://mycashbot.online/success.html?status=success&order_id=' + data.orderID + '&user_id=' + userId;
                });
            },
            
            // ЕСЛИ ОТМЕНИЛИ - НА CANCEL.HTML
            onCancel: function(data) {
                console.log('❌ Оплата отменена');
                window.location.href = 'cancel.html';
            },
            
            // ЕСЛИ ОШИБКА
            onError: function(err) {
                console.error('❌ Ошибка:', err);
                alert('❌ Произошла ошибка. Проверьте консоль (F12)');
            }
            
        }).render('#paypal-button-container');
        
    } else {
        document.getElementById('paypal-button-container').innerHTML = 
            '<p style="color: red;">⚠️ PayPal не загружен</p>';
    }
</script>

</body>
</html>
